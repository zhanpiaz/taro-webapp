<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выберите карты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0015 0%, #1a0030 50%, #0d001a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            user-select: none;
        }

        .title {
            font-size: 24px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0 5px;
            text-align: center;
        }
        .subtitle {
            color: #b8a9c9;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
        }
        .counter {
            color: #FFD700;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 360px;
        }

        .card {
            width: 90px;
            height: 140px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            transform-style: preserve-3d;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            border-radius: 12px;
        }

        .card.selected .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            background: linear-gradient(135deg, #1a0f3e, #2a1f5e);
            border: 2px solid rgba(255, 215, 0, 0.4);
            flex-direction: column;
            gap: 5px;
        }
        .card-front::before {
            content: '✦';
            font-size: 28px;
            color: rgba(255, 215, 0, 0.6);
        }
        .card-front::after {
            content: '?';
            font-size: 16px;
            color: rgba(255, 215, 0, 0.3);
        }

        .card-back {
            background: linear-gradient(135deg, #2a1f5e, #4a2f8e);
            border: 2px solid #FFD700;
            transform: rotateY(180deg);
            font-size: 36px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .card:not(.selected):not(.disabled):active {
            transform: scale(0.95);
        }

        .card.selected {
            transform: scale(1.05);
        }

        .card.disabled:not(.selected) {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .card.glow {
            animation: glowPulse 1.5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.2); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        }

        .confirm-btn {
            width: 100%;
            max-width: 360px;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 12px;
            color: #1a0030;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
            display: none;
        }
        .confirm-btn.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        .confirm-btn:active {
            transform: scale(0.97);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .selected-display {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            min-height: 50px;
            align-items: center;
            justify-content: center;
        }
        .selected-slot {
            width: 40px;
            height: 40px;
            border: 2px dashed rgba(255,215,0,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        .selected-slot.filled {
            border-color: #FFD700;
            background: rgba(255,215,0,0.1);
        }

        .done-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .done-screen.active { display: block; }
        .done-screen .emoji { font-size: 60px; margin-bottom: 20px; }
        .done-screen h2 {
            color: #FFD700;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .done-screen p {
            color: #b8a9c9;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div id="pickScreen">
        <div class="title">🔮 Выберите 3 карты</div>
        <div class="subtitle">Сосредоточьтесь на вашем вопросе и выберите карты интуитивно</div>
        
        <div class="selected-display">
            <div class="selected-slot" id="slot1"></div>
            <div class="selected-slot" id="slot2"></div>
            <div class="selected-slot" id="slot3"></div>
        </div>

        <div class="counter" id="counter">Выбрано: 0 / 3</div>

        <div class="cards-grid" id="cardsGrid"></div>

        <button class="confirm-btn" id="confirmBtn" onclick="confirmCards()">
            ✨ Раскрыть судьбу
        </button>
    </div>

    <div class="done-screen" id="doneScreen">
        <div class="emoji">🌟</div>
        <h2>Карты выбраны!</h2>
        <p>Возвращайтесь в чат — бот уже готовит ваш расклад...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const cardEmojis = ['🌙', '⭐', '☀️', '🔥', '💧', '🌿', '⚡'];
        let selectedCards = [];
        let cardData = [];

        function init() {
            const grid = document.getElementById('cardsGrid');
            
            // Shuffle card emojis
            const shuffled = [...cardEmojis].sort(() => Math.random() - 0.5);
            
            shuffled.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'card glow';
                card.dataset.index = i;
                card.dataset.emoji = emoji;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back">${emoji}</div>
                    </div>
                `;
                card.onclick = () => toggleCard(card, i, emoji);
                grid.appendChild(card);
                cardData.push({ index: i, emoji: emoji, element: card });
            });
        }

        function toggleCard(card, index, emoji) {
            if (card.classList.contains('selected')) {
                // Deselect
                card.classList.remove('selected');
                selectedCards = selectedCards.filter(c => c.index !== index);
                updateUI();
                return;
            }

            if (selectedCards.length >= 3) return;

            card.classList.remove('glow');
            card.classList.add('selected');
            selectedCards.push({ index, emoji });
            updateUI();
        }

        function updateUI() {
            const count = selectedCards.length;
            document.getElementById('counter').textContent = `Выбрано: ${count} / 3`;

            // Update slots
            for (let i = 0; i < 3; i++) {
                const slot = document.getElementById(`slot${i+1}`);
                if (selectedCards[i]) {
                    slot.textContent = selectedCards[i].emoji;
                    slot.classList.add('filled');
                } else {
                    slot.textContent = '';
                    slot.classList.remove('filled');
                }
            }

            // Disable unselected if 3 selected
            cardData.forEach(c => {
                if (count >= 3 && !c.element.classList.contains('selected')) {
                    c.element.classList.add('disabled');
                } else {
                    c.element.classList.remove('disabled');
                }
            });

            // Show confirm button
            const btn = document.getElementById('confirmBtn');
            if (count === 3) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        }

        function confirmCards() {
            const picks = selectedCards.map(c => c.emoji).join(',');
            
            // Send data to bot
            tg.sendData(JSON.stringify({
                action: 'cards_selected',
                cards: selectedCards.map(c => c.emoji)
            }));

            // Show done screen
            document.getElementById('pickScreen').style.display = 'none';
            document.getElementById('doneScreen').classList.add('active');

            // Close after 2 seconds
            setTimeout(() => {
                tg.close();
            }, 2000);
        }

        init();
    </script>
</body>
</html>
