<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таро Расклад</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0015 0%, #1a0030 50%, #0d001a 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; }
        
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: #b8a9c9; font-size: 14px; }

        .spread-types {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .spread-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(139,69,19,0.2));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .spread-card:hover, .spread-card:active {
            transform: scale(1.02);
            border-color: rgba(255,215,0,0.6);
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(139,69,19,0.3));
        }
        .spread-icon { font-size: 40px; }
        .spread-info h3 { font-size: 17px; color: #FFD700; margin-bottom: 4px; }
        .spread-info p { font-size: 13px; color: #b8a9c9; }

        .question-screen, .reading-screen { display: none; }
        .question-screen.active, .reading-screen.active,
        .menu-screen.active { display: block; }

        .back-btn {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .question-title {
            text-align: center;
            font-size: 22px;
            color: #FFD700;
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
        }
        textarea::placeholder { color: #666; }
        textarea:focus { border-color: rgba(255,215,0,0.6); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 12px;
            color: #1a0030;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cards-animation {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            min-height: 150px;
            align-items: center;
        }
        .tarot-card {
            width: 80px;
            height: 130px;
            background: linear-gradient(135deg, #2a1f4e, #1a0f3e);
            border: 2px solid #FFD700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            animation: cardFlip 1s ease-in-out;
            animation-fill-mode: both;
        }
        .tarot-card:nth-child(1) { animation-delay: 0.2s; }
        .tarot-card:nth-child(2) { animation-delay: 0.6s; }
        .tarot-card:nth-child(3) { animation-delay: 1.0s; }

        @keyframes cardFlip {
            0% { transform: rotateY(180deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .reading-text {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            line-height: 1.6;
            font-size: 15px;
            color: #e0d6ec;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: #b8a9c9; font-size: 14px; }

        .new-reading-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #FFD700;
            border-radius: 12px;
            color: #FFD700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MENU -->
        <div class="menu-screen active" id="menuScreen">
            <div class="header">
                <h1>✨ Таро Расклад</h1>
                <p>Выберите тип расклада</p>
            </div>
            <div class="spread-types">
                <div class="spread-card" onclick="selectSpread('one')">
                    <div class="spread-icon">🎴</div>
                    <div class="spread-info">
                        <h3>Карта дня</h3>
                        <p>Одна карта — совет на сегодня</p>
                    </div>
                </div>
                <div class="spread-card" onclick="selectSpread('three')">
                    <div class="spread-icon">🃏🃏🃏</div>
                    <div class="spread-info">
                        <h3>Прошлое — Настоящее — Будущее</h3>
                        <p>Три карты — полная картина</p>
                    </div>
                </div>
                <div class="spread-card" onclick="selectSpread('love')">
                    <div class="spread-icon">❤️</div>
                    <div class="spread-info">
                        <h3>Расклад на любовь</h3>
                        <p>Что ждёт в отношениях</p>
                    </div>
                </div>
                <div class="spread-card" onclick="selectSpread('career')">
                    <div class="spread-icon">💼</div>
                    <div class="spread-info">
                        <h3>Расклад на карьеру</h3>
                        <p>Перспективы в работе</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- QUESTION -->
        <div class="question-screen" id="questionScreen">
            <button class="back-btn" onclick="goBack()">← Назад</button>
            <div class="question-title" id="spreadTitle">🎴 Карта дня</div>
            <textarea id="userQuestion" placeholder="Задайте ваш вопрос (необязательно)..."></textarea>
            <button class="submit-btn" onclick="getReading()">🔮 Получить расклад</button>
        </div>

        <!-- READING -->
        <div class="reading-screen" id="readingScreen">
            <div class="loading" id="loadingBlock">
                <div class="cards-animation">
                    <div class="tarot-card">🌙</div>
                    <div class="tarot-card">⭐</div>
                    <div class="tarot-card">☀️</div>
                </div>
                <div class="loading-spinner"></div>
                <p>Карты раскрываются...</p>
            </div>
            <div id="resultBlock" style="display:none;">
                <div class="question-title">✨ Ваш расклад</div>
                <div class="reading-text" id="readingText"></div>
                <button class="new-reading-btn" onclick="newReading()">🔮 Новый расклад</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentSpread = '';
        const BOT_TOKEN = 'YOUR_BOT_TOKEN';

        const spreadTitles = {
            'one': '🎴 Карта дня',
            'three': '🃏 Прошлое — Настоящее — Будущее',
            'love': '❤️ Расклад на любовь',
            'career': '💼 Расклад на карьеру'
        };

        function selectSpread(type) {
            currentSpread = type;
            document.getElementById('menuScreen').classList.remove('active');
            document.getElementById('questionScreen').classList.add('active');
            document.getElementById('spreadTitle').textContent = spreadTitles[type];
        }

        function goBack() {
            document.getElementById('questionScreen').classList.remove('active');
            document.getElementById('readingScreen').classList.remove('active');
            document.getElementById('menuScreen').classList.add('active');
        }

        async function getReading() {
            const question = document.getElementById('userQuestion').value;
            
            document.getElementById('questionScreen').classList.remove('active');
            document.getElementById('readingScreen').classList.add('active');
            document.getElementById('loadingBlock').style.display = 'block';
            document.getElementById('resultBlock').style.display = 'none';

            try {
                const userId = tg.initDataUnsafe?.user?.id;
                
                // Send command to bot via deep link
                const spreadMessages = {
                    'one': '/card_of_the_day',
                    'three': '/spread',
                    'love': '/love_spread', 
                    'career': '/career_spread'
                };

                // Use Telegram sendMessage API to trigger bot
                const message = spreadMessages[currentSpread] + 
                    (question ? '\n' + question : '');

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: message
                    })
                });

                // Show result after delay
                setTimeout(() => {
                    document.getElementById('loadingBlock').style.display = 'none';
                    document.getElementById('resultBlock').style.display = 'block';
                    document.getElementById('readingText').textContent = 
                        '✨ Расклад отправлен в чат с ботом!\n\nОткройте чат с ботом, чтобы увидеть результат.';
                }, 3000);

            } catch(e) {
                document.getElementById('loadingBlock').style.display = 'none';
                document.getElementById('resultBlock').style.display = 'block';
                document.getElementById('readingText').textContent = 'Произошла ошибка. Попробуйте снова.';
            }
        }

        function newReading() {
            document.getElementById('readingScreen').classList.remove('active');
            document.getElementById('menuScreen').classList.add('active');
            document.getElementById('userQuestion').value = '';
        }
    </script>
</body>
</html>
