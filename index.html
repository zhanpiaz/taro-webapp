<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таро Расклад</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linearSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }
        .title {
            text-align: center;
            font-size: 24px;
            margin: 10px 0 5px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #b388ff;
            margin-bottom: 20px;
        }
        .counter {
            text-align: center;
            font-size: 16px;
            color: #FFD700;
            margin-bottom: 15px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            aspect-ratio: 2/3;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card-back {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a0845, #6a0572);
            border: 2px solid #9c27b0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .card.selected .card-back {
            border-color: #FFD700;
            background: linear-gradient(135deg, #4a0845, #8a0572);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        .card.disabled { opacity: 0.4; pointer-events: none; }
        .card-number {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #FFD700;
            color: #1a0030;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        .card.selected .card-number { display: flex; }
        #confirmBtn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a0030;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        #confirmBtn:active { transform: translateX(-50%) scale(0.95); }
        #status {
            display: none;
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="title">🔮 Выберите 3 карты</div>
    <div class="subtitle">Доверьтесь интуиции</div>
    <div class="counter">Выбрано: <span id="count">0</span> / 3</div>
    <div class="cards-grid" id="grid"></div>
    <button id="confirmBtn">✨ Раскрыть судьбу ✨</button>
    <div id="status">✨ Карты отправлены! Ожидайте расклад...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const allCards = [
            "Шут","Маг","Жрица","Императрица","Император","Иерофант",
            "Влюблённые","Колесница","Сила","Отшельник","Колесо Фортуны",
            "Справедливость","Повешенный","Смерть","Умеренность","Дьявол",
            "Башня","Звезда","Луна","Солнце","Суд","Мир"
        ];

        const symbols = ["✦","⚝","☽","♆","⚕","✧","♅","⛧","☿","♄","⚶","✶","♃","⚷","♇","✵","⚸","☾","♁","✺","⚹","✦"];

        let selected = [];
        const grid = document.getElementById("grid");
        const countEl = document.getElementById("count");
        const confirmBtn = document.getElementById("confirmBtn");
        const statusEl = document.getElementById("status");

        // Shuffle
        const shuffled = [...allCards].sort(() => Math.random() - 0.5);

        shuffled.forEach((name, i) => {
            const card = document.createElement("div");
            card.className = "card";
            card.dataset.name = name;
            card.dataset.index = i;
            card.innerHTML = `
                <div class="card-back">${symbols[i % symbols.length]}</div>
                <div class="card-number"></div>
            `;
            card.onclick = () => toggleCard(card, name);
            grid.appendChild(card);
        });

        function toggleCard(card, name) {
            if (card.classList.contains("selected")) {
                card.classList.remove("selected");
                selected = selected.filter(n => n !== name);
            } else {
                if (selected.length >= 3) return;
                card.classList.add("selected");
                selected.push(name);
            }

            countEl.textContent = selected.length;

            // Update numbers
            document.querySelectorAll(".card").forEach(c => {
                const idx = selected.indexOf(c.dataset.name);
                const numEl = c.querySelector(".card-number");
                if (idx >= 0) {
                    numEl.textContent = idx + 1;
                }
            });

            // Update disabled
            document.querySelectorAll(".card").forEach(c => {
                if (selected.length >= 3 && !c.classList.contains("selected")) {
                    c.classList.add("disabled");
                } else {
                    c.classList.remove("disabled");
                }
            });

            // Show/hide button
            if (selected.length === 3) {
                confirmBtn.style.display = "block";
                try { tg.MainButton.setText("✨ Раскрыть судьбу"); tg.MainButton.show(); } catch(e) {}
            } else {
                confirmBtn.style.display = "none";
                try { tg.MainButton.hide(); } catch(e) {}
            }
        }

        function sendCards() {
            const data = JSON.stringify({action: "cards_selected", cards: selected});
            confirmBtn.style.display = "none";
            grid.style.display = "none";
            statusEl.style.display = "block";
            try { tg.MainButton.hide(); } catch(e) {}
            try {
                tg.sendData(data);
            } catch(e) {
                statusEl.textContent = "Ошибка: " + e.message;
            }
            setTimeout(() => { try { tg.close(); } catch(e) {} }, 1500);
        }

        confirmBtn.onclick = sendCards;
        try { tg.MainButton.onClick(sendCards); } catch(e) {}
    </script>
</body>
</html>
